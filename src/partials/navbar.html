<header
  id="site-header"
  class="fixed top-0 left-0 right-0 z-50 border-b border-slate-200/60 bg-white/90 backdrop-blur-md transition-all duration-300"
>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-18 items-center justify-between">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-3" aria-label="NugaDev Home">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-lg font-bold text-white"
        >
          <img src="/assets/logo/logo.svg" alt="logo" />
        </div>

        <div>
          <span class="block text-lg font-bold text-dark"> Nuga </span>

          <span class="block text-xs text-secondary"> Web Development </span>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <nav id="main-nav" aria-label="Main Navigation" class="hidden lg:block">
        <ul class="flex items-center gap-8">
          <li>
            <a
              href="/"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              Beranda
            </a>
          </li>

          <li>
            <a
              href="/#services"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              Layanan
            </a>
          </li>

          <li>
            <a
              href="/#portfolio"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              Showcase
            </a>
          </li>

          <li>
            <a
              href="/blog/index.html"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              Artikel
            </a>
          </li>

          <li>
            <a
              href="/#faq"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              FAQ
            </a>
          </li>

          <li>
            <a
              href="/#cta"
              data-nav
              class="font-medium text-slate-700 transition hover:text-primary"
            >
              Kontak
            </a>
          </li>
        </ul>
      </nav>

      <!-- Desktop CTA -->
      <div class="hidden lg:flex">
        <a
          href="https://wa.me/6285265605782?text=Halo%20NugaWebDevelopment,%20saya%20ingin%20konsultasi%20website."
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center justify-center rounded-xl bg-primary px-5 py-3 font-semibold text-white transition hover:opacity-90"
        >
          Konsultasi Gratis
        </a>
      </div>

      <!-- Mobile Toggle -->
      <button
        id="mobile-menu-button"
        type="button"
        aria-label="Buka menu navigasi"
        aria-expanded="false"
        aria-controls="mobile-menu"
        data-mobile-nav-toggle
        class="flex h-11 w-11 items-center justify-center rounded-xl border border-slate-200 lg:hidden"
      >
        <!-- Hamburger -->
        <svg
          id="menu-open-icon"
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>

        <!-- Close -->
        <svg
          id="menu-close-icon"
          xmlns="http://www.w3.org/2000/svg"
          class="hidden h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    id="mobile-menu"
    data-mobile-nav
    class="hidden border-t border-slate-200 bg-white lg:hidden"
  >
    <nav
      id="main-nav"
      class="mx-auto max-w-7xl px-4 py-6"
      aria-label="Mobile Navigation"
    >
      <ul class="space-y-5">
        <li>
          <a
            href="/"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"

          </a>

        <li>

            href="/#services"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"
          >
            Layanan
          </a>
        </li>

        <li>
          <a
            href="/#portfolio"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"

            Showcase
          </a>
        </li>

        <li>
          <a
            href="/blog/index.html"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"
          >
            Artikel
          </a>
        </li>

        <li>
          <a
            href="/#faq"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"
          >
            FAQ
          </a>
        </li>

        <li>
          <a
            href="/#cta"
            data-mobile-nav-link
            data-nav
            class="block font-medium text-slate-700 transition hover:text-primary"
          >
            Kontak
          </a>
        </li>
      </ul>

      <div class="mt-6">
        <a
          href="https://wa.me/6285265605782?text=Halo%20NugaDev,%20saya%20ingin%20konsultasi%20website."
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex w-full items-center justify-center rounded-xl bg-primary px-5 py-3 font-semibold text-white"
        >
          Konsultasi Gratis via WhatsApp
        </a>
      </div>
    </nav>
  </div>
</header>
